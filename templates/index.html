<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plagiarism Report</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --border: #334155;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 0;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        h1 {
            margin: 0;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        main {
            width: 100%;
            max-width: 1000px;
            padding: 2rem;
            box-sizing: border-box;
        }

        .controls {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .slider-container {
            flex: 1;
            min-width: 300px;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background: var(--accent-hover);
        }

        .threshold-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            min-width: 80px;
            text-align: right;
        }

        .btn-primary {
            background-color: var(--accent);
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.9rem;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        .btn-primary:disabled {
            background-color: var(--border);
            cursor: not-allowed;
            color: var(--text-secondary);
        }

        .clusters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            border-color: var(--accent);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.75rem;
        }

        .cluster-id {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .size-badge {
            background-color: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .questions {
            margin-bottom: 1rem;
        }

        .tag {
            display: inline-block;
            background-color: #334155;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-right: 0.5rem;
            color: #e2e8f0;
        }

        .members {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .member {
            background-color: #0f172a;
            border: 1px solid #334155;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.875rem;
            color: #cbd5e1;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .rank {
            font-size: 0.75rem;
            color: #fbbf24;
            /* Amber-400 */
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 3rem;
            grid-column: 1 / -1;
        }
    </style>
</head>

<body>
    <header>
        <h1>Plagiarism Detector Report</h1>
    </header>

    <main>
        <div class="controls">
            <div class="slider-container">
                <label for="threshold">Similarity Threshold</label>
                <input type="range" id="threshold" min="0" max="100" value="50" step="1">
            </div>
            <div class="threshold-value">
                <span id="thresholdDisplay">50</span>%
            </div>
            <button id="runJPlagBtn" class="btn-primary">Run JPlag Check</button>
        </div>

        <div id="results" class="clusters-grid">
            <!-- Clusters will be injected here -->
        </div>
    </main>

    <script>
        const thresholdInput = document.getElementById('threshold');
        const thresholdDisplay = document.getElementById('thresholdDisplay');
        const resultsContainer = document.getElementById('results');

        function fetchReport(threshold) {
            fetch(`/api/report?threshold=${threshold}`)
                .then(response => response.json())
                .then(data => {
                    renderClusters(data);
                })
                .catch(err => console.error('Error fetching report:', err));
        }

        function renderClusters(clusters) {
            resultsContainer.innerHTML = '';

            if (clusters.length === 0) {
                resultsContainer.innerHTML = '<div class="empty-state">No clusters found above this threshold.</div>';
                return;
            }

            clusters.forEach((cluster, index) => {
                const card = document.createElement('div');
                card.className = 'card';

                const questionsHtml = cluster.questions.map(q => `<span class="tag">${q}</span>`).join('');
                const membersHtml = cluster.members.map(m => {
                    const rankDisplay = m.rank && m.rank !== 'N/A' ? `<span class="rank">#${m.rank}</span>` : '';
                    return `<span class="member">${m.username} ${rankDisplay}</span>`;
                }).join('');

                card.innerHTML = `
                    <div class="card-header">
                        <span class="cluster-id">Group #${index + 1}</span>
                        <span class="size-badge">${cluster.size} Users</span>
                    </div>
                    <div class="questions">
                        <strong>Involved:</strong> ${questionsHtml}
                    </div>
                    <div class="members">
                        ${membersHtml}
                    </div>
                `;
                resultsContainer.appendChild(card);
            });
        }

        // Event Listeners
        thresholdInput.addEventListener('input', (e) => {
            const val = e.target.value;
            thresholdDisplay.innerText = val;
        });

        thresholdInput.addEventListener('change', (e) => {
            fetchReport(e.target.value);
        });



        const runJPlagBtn = document.getElementById('runJPlagBtn');
        runJPlagBtn.addEventListener('click', () => {
            // Disable button and show loading state
            runJPlagBtn.disabled = true;
            const originalText = runJPlagBtn.innerText;
            runJPlagBtn.innerText = 'Running Analysis...';

            fetch('/api/run-jplag', { method: 'POST' })
                .then(response => {
                    if (response.ok) {
                        return response.json();
                    }
                    throw new Error('Analysis failed');
                })
                .then(data => {
                    alert('Analysis complete! Refreshing report...');
                    fetchReport(thresholdInput.value);
                })
                .catch(err => {
                    console.error('Error running JPlag:', err);
                    alert('Failed to run JPlag analysis. Check server logs.');
                })
                .finally(() => {
                    runJPlagBtn.disabled = false;
                    runJPlagBtn.innerText = originalText;
                });
        });

        // Initial Load
        fetchReport(50);
    </script>
</body>

</html>
